<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 / 注册</title>
    <style>
        /* ========== 全局重置与基础 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* ========== 网格背景 ========== */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #FFF8F0;
            background-image:
                linear-gradient(rgba(255, 182, 193, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 182, 193, 0.3) 1px, transparent 1px);
            background-size: 24px 24px;
            z-index: 0;
        }

        .grid-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(255, 240, 220, 0.6) 100%);
            pointer-events: none;
        }

        /* ========== 装饰角标 ========== */
        .corner-decor {
            position: fixed;
            width: 60px;
            height: 60px;
            z-index: 1;
            opacity: 0.4;
        }
        .corner-decor::before,
        .corner-decor::after {
            content: '';
            position: absolute;
            background: #E8A0B4;
        }
        .corner-tl { top: 20px; left: 20px; }
        .corner-tl::before { top: 0; left: 0; width: 30px; height: 2px; }
        .corner-tl::after { top: 0; left: 0; width: 2px; height: 30px; }

        .corner-tr { top: 20px; right: 20px; }
        .corner-tr::before { top: 0; right: 0; width: 30px; height: 2px; }
        .corner-tr::after { top: 0; right: 0; width: 2px; height: 30px; }

        .corner-bl { bottom: 20px; left: 20px; }
        .corner-bl::before { bottom: 0; left: 0; width: 30px; height: 2px; }
        .corner-bl::after { bottom: 0; left: 0; width: 2px; height: 30px; }

        .corner-br { bottom: 20px; right: 20px; }
        .corner-br::before { bottom: 0; right: 0; width: 30px; height: 2px; }
        .corner-br::after { bottom: 0; right: 0; width: 2px; height: 30px; }

        /* ========== 浮动装饰圆点 ========== */
        .floating-dots {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .dot {
            position: absolute;
            border-radius: 50%;
            opacity: 0.5;
            animation: floatDot 6s ease-in-out infinite;
        }

        @keyframes floatDot {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        /* ========== 卡片容器 ========== */
        .login-card {
            position: relative;
            z-index: 10;
            width: 420px;
            max-width: 90vw;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 48px 40px 40px;
            box-shadow:
                0 8px 32px rgba(200, 150, 170, 0.2),
                0 2px 8px rgba(200, 150, 170, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
            border: 1.5px solid rgba(232, 160, 180, 0.3);
            animation: cardFadeIn 0.8s ease-out;
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, #E8A0B4, #F0C27F, #E8A0B4);
            border-radius: 0 0 4px 4px;
        }

        /* ========== 标题区域 ========== */
        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #2D2D2D;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }

        .login-header .subtitle {
            font-size: 13px;
            color: #C4956A;
            letter-spacing: 2px;
            font-weight: 400;
        }

        /* ========== 表单区域 ========== */
        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #6B5B73;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            width: 18px;
            height: 18px;
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .form-group:focus-within .input-icon {
            opacity: 0.9;
        }

        .form-input {
            width: 100%;
            height: 48px;
            padding: 0 16px 0 44px;
            font-size: 15px;
            color: #333;
            background: rgba(255, 248, 240, 0.6);
            border: 1.5px solid rgba(232, 160, 180, 0.35);
            border-radius: 10px;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-input::placeholder {
            color: #C4B0A0;
            font-size: 13px;
        }

        .form-input:focus {
            border-color: #E8A0B4;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 0 3px rgba(232, 160, 180, 0.15);
        }

        .input-status {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .form-input:focus ~ .input-status {
            width: 60%;
        }

        .input-status.idle { background: #E8A0B4; }
        .input-status.valid { background: #6BCB77; }
        .input-status.invalid { background: #E74C3C; }

        /* ========== 选项行 ========== */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            color: #8B7B8B;
            user-select: none;
        }

        .remember-me input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border: 1.5px solid #D4B8C8;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .remember-me input[type="checkbox"]:checked {
            background: #E8A0B4;
            border-color: #E8A0B4;
        }

        .remember-me input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 11px;
            font-weight: bold;
        }

        .forgot-link {
            color: #C4956A;
            text-decoration: none;
            transition: color 0.2s;
            cursor: pointer;
        }

        .forgot-link:hover {
            color: #A87A55;
            text-decoration: underline;
        }

        /* ========== 主按钮 ========== */
        .login-btn {
            width: 100%;
            height: 50px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 6px;
            color: #FFF;
            background: linear-gradient(135deg, #E8A0B4, #D4849A);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(232, 160, 180, 0.35);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(232, 160, 180, 0.45);
        }

        .login-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(232, 160, 180, 0.3);
        }

        .login-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 40%;
            height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            transform: skewX(-20deg);
            animation: btnShine 4s ease-in-out infinite;
        }

        @keyframes btnShine {
            0%, 75%, 100% { left: -60%; }
            50% { left: 120%; }
        }

        /* ========== 分割线 ========== */
        .divider {
            display: flex;
            align-items: center;
            margin: 28px 0;
            gap: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(232, 160, 180, 0.4), transparent);
        }

        .divider span {
            font-size: 12px;
            color: #B8A0A8;
            white-space: nowrap;
        }

        /* ========== 第三方登录 ========== */
        .social-login {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1.5px solid rgba(232, 160, 180, 0.3);
            background: rgba(255, 248, 240, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            border-color: #E8A0B4;
            background: rgba(232, 160, 180, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(232, 160, 180, 0.2);
        }

        .social-btn svg {
            width: 20px;
            height: 20px;
        }

        /* ========== 底部提示 ========== */
        .signup-hint {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #8B7B8B;
        }

        .signup-hint a {
            color: #C4956A;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
        }

        .signup-hint a:hover {
            color: #A87A55;
            text-decoration: underline;
        }

        /* ========== Toast 提示 ========== */
        .toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 14px 28px;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(232, 160, 180, 0.3);
            font-size: 14px;
            color: #6B5B73;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 90vw;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast-icon {
            font-size: 18px;
        }

        /* ========== 登录/注册面板切换 ========== */
        .form-panel {
            display: none;
        }
        .form-panel.active {
            display: block;
            animation: panelFadeIn 0.4s ease-out;
        }

        @keyframes panelFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== 登录成功后的欢迎面板 ========== */
        .welcome-panel {
            display: none;
            text-align: center;
            padding: 20px 0;
        }
        .welcome-panel.active {
            display: block;
            animation: panelFadeIn 0.5s ease-out;
        }

        .welcome-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #E8A0B4, #F0C27F);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: white;
            box-shadow: 0 4px 16px rgba(232, 160, 180, 0.3);
        }

        .welcome-panel h2 {
            font-size: 22px;
            color: #2D2D2D;
            margin-bottom: 8px;
        }

        .welcome-panel p {
            font-size: 14px;
            color: #8B7B8B;
            margin-bottom: 6px;
        }

        .welcome-panel .user-info {
            background: rgba(255, 248, 240, 0.6);
            border-radius: 10px;
            padding: 16px;
            margin: 20px 0;
            text-align: left;
        }

        .welcome-panel .user-info .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 13px;
            border-bottom: 1px solid rgba(232, 160, 180, 0.15);
        }

        .welcome-panel .user-info .info-row:last-child {
            border-bottom: none;
        }

        .welcome-panel .user-info .info-label {
            color: #8B7B8B;
        }

        .welcome-panel .user-info .info-value {
            color: #2D2D2D;
            font-weight: 500;
        }

        .logout-btn {
            width: 100%;
            height: 46px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 4px;
            color: #D4849A;
            background: transparent;
            border: 1.5px solid #E8A0B4;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 16px;
        }

        .logout-btn:hover {
            background: rgba(232, 160, 180, 0.1);
            transform: translateY(-1px);
        }

        /* ========== 响应式 ========== */
        @media (max-width: 480px) {
            .login-card {
                padding: 36px 24px 32px;
                margin: 16px;
            }
            .login-header h1 { font-size: 24px; }
            .login-btn { height: 46px; font-size: 15px; }
        }
    </style>
</head>
<body>

    <!-- 网格背景 -->
    <div class="grid-bg"></div>

    <!-- 装饰角标 -->
    <div class="corner-decor corner-tl"></div>
    <div class="corner-decor corner-tr"></div>
    <div class="corner-decor corner-bl"></div>
    <div class="corner-decor corner-br"></div>

    <!-- 浮动装饰圆点 -->
    <div class="floating-dots">
        <div class="dot" style="width:10px;height:10px;background:#7EB8DA;top:12%;left:8%;animation-delay:0s;"></div>
        <div class="dot" style="width:8px;height:8px;background:#B088D0;top:18%;right:12%;animation-delay:1s;"></div>
        <div class="dot" style="width:12px;height:12px;background:#E8A0B4;bottom:20%;left:15%;animation-delay:2s;"></div>
        <div class="dot" style="width:6px;height:6px;background:#6BCB77;bottom:30%;right:10%;animation-delay:0.5s;"></div>
        <div class="dot" style="width:9px;height:9px;background:#F0C27F;top:60%;left:5%;animation-delay:3s;"></div>
        <div class="dot" style="width:7px;height:7px;background:#E74C3C;top:35%;right:6%;animation-delay:1.5s;"></div>
        <div class="dot" style="width:11px;height:11px;background:#7EB8DA;bottom:10%;left:45%;animation-delay:2.5s;"></div>
        <div class="dot" style="width:8px;height:8px;background:#B088D0;top:8%;left:50%;animation-delay:4s;"></div>
    </div>

    <!-- 卡片 -->
    <div class="login-card">
        <!-- 标题 -->
        <div class="login-header">
            <h1 id="cardTitle">登 录</h1>
            <p class="subtitle" id="cardSubtitle">欢迎回来，请登录你的账号</p>
        </div>

        <!-- ====== 登录面板 ====== -->
        <div class="form-panel active" id="loginPanel">
            <form id="loginForm" onsubmit="return false;">
                <div class="form-group">
                    <label for="loginUsername">用户名</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="#8B7B8B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="text" id="loginUsername" class="form-input" placeholder="请输入用户名" autocomplete="username">
                        <div class="input-status idle"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="loginPassword">密码</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="#8B7B8B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" id="loginPassword" class="form-input" placeholder="请输入密码" autocomplete="current-password">
                        <div class="input-status idle"></div>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span>记住密码</span>
                    </label>
                    <a class="forgot-link" onclick="showToast('💡 该功能暂未开放')">忘记密码？</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn" onclick="handleLogin()">登 录</button>
            </form>

            <div class="divider"><span>其他登录方式</span></div>

            <div class="social-login">
                <div class="social-btn" onclick="showToast('💬 微信登录暂未开放')" title="微信登录">

                </div>
                <div class="social-btn" onclick="showToast('🐧 QQ登录暂未开放')" title="QQ登录">
                    <svg viewBox="0 0 24 24" fill="#12B7F5"><path d="M12.003 2c-2.265 0-6.29 1.364-6.29 7.325v1.195S3.55 14.96 3.55 17.474c0 .665.17 1.025.396 1.025.116 0 .263-.073.42-.216-.156.563-.26 1.093-.26 1.54 0 .936.393 1.262.795 1.262.312 0 .652-.18 1.012-.498a5.09 5.09 0 0 0 .897 1.14c.7.678 1.573 1.073 2.448 1.073h5.588c.875 0 1.748-.395 2.448-1.073a5.09 5.09 0 0 0 .897-1.14c.36.318.7.498 1.012.498.402 0 .795-.326.795-1.262 0-.447-.104-.977-.26-1.54.157.143.304.216.42.216.226 0 .396-.36.396-1.025 0-2.514-2.163-6.954-2.163-6.954V9.325C18.293 3.364 14.268 2 12.003 2z"/></svg>
                </div>
                <div class="social-btn" onclick="showToast('🔴 微博登录暂未开放')" title="微博登录">
                    <svg viewBox="0 0 24 24" fill="#E6162D"><path d="M10.098 20.323c-3.977.391-7.414-1.406-7.672-4.02-.259-2.609 2.759-5.047 6.74-5.441 3.979-.394 7.413 1.404 7.671 4.018.259 2.6-2.759 5.049-6.739 5.443zM9.05 17.219c-.384.616-1.208.884-1.829.602-.612-.279-.793-.991-.406-1.593.379-.595 1.176-.861 1.793-.583.631.283.822.985.442 1.574zm1.27-1.627c-.141.237-.449.353-.689.253-.236-.09-.307-.361-.164-.585.14-.227.436-.346.672-.24.239.09.315.36.181.572zm.176-2.719c-1.893-.493-4.033.45-4.857 2.118-.836 1.704-.026 3.591 1.886 4.21 1.983.642 4.318-.341 5.132-2.179.8-1.793-.201-3.642-2.161-4.149zM17.014 2.575c.085-.072.245-.156.348-.131.268.066.386.378.266.662l-.006.014c-.077.18-.173.357-.285.526-.325.493-.785.874-1.312 1.126-.09.043-.18.082-.274.116-.058.021-.12.041-.184.055-.096.021-.196.031-.296.031-.272 0-.534-.085-.757-.247-.083-.06-.161-.128-.231-.204-.038-.042-.073-.087-.104-.134-.047-.07-.087-.144-.12-.222-.014-.033-.026-.067-.036-.102-.018-.064-.029-.13-.033-.197-.003-.048-.003-.096.001-.143.009-.108.04-.21.089-.303.038-.073.086-.14.143-.199.056-.057.12-.106.191-.145.07-.039.145-.068.224-.087.077-.018.157-.027.237-.027.078 0 .155.009.23.027.074.018.145.047.21.085.066.038.126.085.179.14.053.054.098.115.135.181.037.066.066.137.086.211.02.074.03.151.03.229 0 .079-.01.157-.03.234-.021.078-.053.152-.095.22-.041.068-.092.13-.151.184-.06.054-.126.1-.198.136-.072.036-.149.062-.229.077-.08.015-.162.02-.244.014-.083-.006-.164-.022-.241-.049-.078-.027-.151-.064-.218-.111-.067-.047-.128-.103-.18-.167-.053-.064-.097-.135-.132-.211-.035-.076-.06-.157-.075-.24-.015-.084-.019-.169-.013-.254.006-.086.022-.17.049-.251.027-.081.064-.158.111-.229.047-.071.103-.136.167-.192.064-.056.135-.103.211-.14.077-.037.158-.064.242-.08.084-.016.17-.021.256-.015.086.006.17.023.251.05.082.027.159.065.23.112.071.047.136.104.193.168.057.065.105.137.143.214.038.077.066.159.083.244.017.085.022.172.015.259-.006.087-.023.173-.051.256-.028.083-.066.162-.114.235-.048.073-.105.14-.17.199-.065.059-.137.109-.215.149-.078.04-.161.07-.247.088-.087.018-.176.024-.264.018-.089-.006-.176-.024-.259-.053-.083-.029-.162-.068-.234-.117-.072-.049-.138-.107-.195-.173-.058-.066-.106-.14-.144-.219-.038-.079-.066-.163-.083-.25-.017-.087-.023-.176-.017-.264z"/></svg>
                </div>
                <div class="social-btn" onclick="showToast('🐱 GitHub登录暂未开放')" title="GitHub登录">
                    <svg viewBox="0 0 24 24" fill="#333"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
                </div>
            </div>

            <div class="signup-hint">
                还没有账号？<a onclick="switchPanel('register')">立即注册</a>
            </div>
        </div>

        <!-- ====== 注册面板 ====== -->
        <div class="form-panel" id="registerPanel">
            <form id="registerForm" onsubmit="return false;">
                <div class="form-group">
                    <label for="regUsername">用户名</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="#8B7B8B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="text" id="regUsername" class="form-input" placeholder="3-20个字符" autocomplete="username">
                        <div class="input-status idle"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="regEmail">邮箱（选填）</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="#8B7B8B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                        <input type="email" id="regEmail" class="form-input" placeholder="your@email.com" autocomplete="email">
                        <div class="input-status idle"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="regPassword">密码</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="#8B7B8B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" id="regPassword" class="form-input" placeholder="至少6位密码" autocomplete="new-password">
                        <div class="input-status idle"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="regConfirm">确认密码</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="#8B7B8B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        </svg>
                        <input type="password" id="regConfirm" class="form-input" placeholder="再次输入密码" autocomplete="new-password">
                        <div class="input-status idle"></div>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="registerBtn" onclick="handleRegister()" style="margin-top: 8px;">注 册</button>
            </form>

            <div class="signup-hint" style="margin-top: 20px;">
                已有账号？<a onclick="switchPanel('login')">返回登录</a>
            </div>
        </div>

        <!-- ====== 欢迎面板（登录成功后） ====== -->
        <div class="welcome-panel" id="welcomePanel">
            <div class="welcome-avatar">👤</div>
            <h2 id="welcomeName">欢迎回来！</h2>
            <p id="welcomeEmail"></p>
            <div class="user-info">
                <div class="info-row">
                    <span class="info-label">用户名</span>
                    <span class="info-value" id="infoUsername">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">昵称</span>
                    <span class="info-value" id="infoNickname">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">邮箱</span>
                    <span class="info-value" id="infoEmail">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">用户ID</span>
                    <span class="info-value" id="infoId">-</span>
                </div>
            </div>
            <button class="logout-btn" onclick="handleLogout()">退出登录</button>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast">
        <span class="toast-icon" id="toastIcon"></span>
        <span id="toastMsg"></span>
    </div>

    <script>
        // ============================================
        // 配置 - API 基础地址
        // 如果前后端分离部署，修改为后端地址，如 http://localhost:3000
        // 如果通过后端静态文件服务，留空即可（同源）
        // ============================================
        const API_BASE = '';  // 同源部署时留空，跨域时填写如 'http://localhost:3000'

        // ============================================
        // Toast 提示
        // ============================================
        let toastTimer = null;
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            toastMsg.textContent = message;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ============================================
        // 面板切换
        // ============================================
        function switchPanel(panel) {
            const loginPanel = document.getElementById('loginPanel');
            const registerPanel = document.getElementById('registerPanel');
            const welcomePanel = document.getElementById('welcomePanel');
            const cardTitle = document.getElementById('cardTitle');
            const cardSubtitle = document.getElementById('cardSubtitle');

            loginPanel.classList.remove('active');
            registerPanel.classList.remove('active');
            welcomePanel.classList.remove('active');

            if (panel === 'login') {
                loginPanel.classList.add('active');
                cardTitle.textContent = '登 录';
                cardSubtitle.textContent = '欢迎回来，请登录你的账号';
            } else if (panel === 'register') {
                registerPanel.classList.add('active');
                cardTitle.textContent = '注 册';
                cardSubtitle.textContent = '创建一个新账号';
            } else if (panel === 'welcome') {
                welcomePanel.classList.add('active');
                cardTitle.textContent = '✨';
                cardSubtitle.textContent = '';
            }
        }

        // ============================================
        // 输入框状态反馈
        // ============================================
        function setupInputStatus(inputId) {
            const input = document.getElementById(inputId);
            input.addEventListener('input', function () {
                const status = this.parentElement.querySelector('.input-status');
                if (this.value.length > 0) {
                    status.className = 'input-status valid';
                } else {
                    status.className = 'input-status idle';
                }
            });
            input.addEventListener('blur', function () {
                const status = this.parentElement.querySelector('.input-status');
                if (this.value.length === 0) {
                    status.className = 'input-status invalid';
                }
            });
        }

        setupInputStatus('loginUsername');
        setupInputStatus('regUsername');
        setupInputStatus('regEmail');

        // 密码长度校验
        function setupPasswordStatus(inputId, minLength) {
            const input = document.getElementById(inputId);
            input.addEventListener('input', function () {
                const status = this.parentElement.querySelector('.input-status');
                if (this.value.length >= minLength) {
                    status.className = 'input-status valid';
                } else if (this.value.length > 0) {
                    status.className = 'input-status idle';
                } else {
                    status.className = 'input-status idle';
                }
            });
            input.addEventListener('blur', function () {
                const status = this.parentElement.querySelector('.input-status');
                if (this.value.length > 0 && this.value.length < minLength) {
                    status.className = 'input-status invalid';
                }
            });
        }

        setupPasswordStatus('loginPassword', 6);
        setupPasswordStatus('regPassword', 6);

        // 确认密码匹配校验
        const regConfirm = document.getElementById('regConfirm');
        regConfirm.addEventListener('input', function () {
            const regPwd = document.getElementById('regPassword').value;
            const status = this.parentElement.querySelector('.input-status');
            if (this.value.length === 0) {
                status.className = 'input-status idle';
            } else if (this.value === regPwd) {
                status.className = 'input-status valid';
            } else {
                status.className = 'input-status invalid';
            }
        });

        // ============================================
        // API 请求封装
        // ============================================
        async function apiRequest(url, method, data) {
            try {
                const options = {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                };
                if (data) options.body = JSON.stringify(data);

                const response = await fetch(API_BASE + url, options);
                const result = await response.json();
                return result;
            } catch (err) {
                console.error('API请求失败:', err);
                return { code: 500, message: '网络连接失败，请检查服务器是否启动' };
            }
        }

        // ============================================
        // 登录处理
        // ============================================
        async function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username) { showToast('⚠️ 请输入用户名'); return; }
            if (!password) { showToast('⚠️ 请输入密码'); return; }
            if (password.length < 6) { showToast('⚠️ 密码长度不能少于6位'); return; }

            const btn = document.getElementById('loginBtn');
            btn.textContent = '登录中...';
            btn.style.opacity = '0.7';
            btn.style.pointerEvents = 'none';

            const result = await apiRequest('/api/auth/login', 'POST', { username, password });

            btn.textContent = '登 录';
            btn.style.opacity = '1';
            btn.style.pointerEvents = 'auto';

            if (result.code === 200) {
                // 保存 Token
                localStorage.setItem('token', result.data.token);
                localStorage.setItem('user', JSON.stringify(result.data.user));

                // 记住密码
                if (document.getElementById('remember').checked) {
                    localStorage.setItem('savedUsername', username);
                } else {
                    localStorage.removeItem('savedUsername');
                }

                showToast('✅ 登录成功！');

                // 显示欢迎面板
                setTimeout(() => {
                    showWelcomePanel(result.data.user);
                }, 500);
            } else {
                showToast('❌ ' + result.message);
            }
        }

        // ============================================
        // 注册处理
        // ============================================
        async function handleRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;

            if (!username) { showToast('⚠️ 请输入用户名'); return; }
            if (username.length < 3 || username.length > 20) { showToast('⚠️ 用户名长度需在3-20个字符之间'); return; }
            if (!password) { showToast('⚠️ 请输入密码'); return; }
            if (password.length < 6) { showToast('⚠️ 密码长度不能少于6位'); return; }
            if (password !== confirm) { showToast('⚠️ 两次输入的密码不一致'); return; }

            const btn = document.getElementById('registerBtn');
            btn.textContent = '注册中...';
            btn.style.opacity = '0.7';
            btn.style.pointerEvents = 'none';

            const result = await apiRequest('/api/auth/register', 'POST', {
                username,
                password,
                email: email || undefined,
                nickname: username
            });

            btn.textContent = '注 册';
            btn.style.opacity = '1';
            btn.style.pointerEvents = 'auto';

            if (result.code === 201) {
                showToast('🎉 注册成功！已自动登录');
                localStorage.setItem('token', result.data.token);
                localStorage.setItem('user', JSON.stringify(result.data.user));

                setTimeout(() => {
                    showWelcomePanel(result.data.user);
                }, 500);
            } else {
                showToast('❌ ' + result.message);
            }
        }

        // ============================================
        // 显示欢迎面板
        // ============================================
        function showWelcomePanel(user) {
            document.getElementById('welcomeName').textContent = '欢迎回来，' + (user.nickname || user.username) + '！';
            document.getElementById('welcomeEmail').textContent = user.email || '';
            document.getElementById('infoUsername').textContent = user.username;
            document.getElementById('infoNickname').textContent = user.nickname || user.username;
            document.getElementById('infoEmail').textContent = user.email || '未设置';
            document.getElementById('infoId').textContent = '#' + user.id;
            switchPanel('welcome');
        }

        // ============================================
        // 退出登录
        // ============================================
        function handleLogout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            showToast('👋 已退出登录');
            switchPanel('login');
            document.getElementById('loginPassword').value = '';
        }

        // ============================================
        // 回车键提交
        // ============================================
        document.getElementById('loginForm').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') { e.preventDefault(); handleLogin(); }
        });
        document.getElementById('registerForm').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') { e.preventDefault(); handleRegister(); }
        });

        // ============================================
        // 页面加载时：检查是否已登录 / 恢复记住的用户名
        // ============================================
        (function init() {
            // 恢复记住的用户名
            const savedUsername = localStorage.getItem('savedUsername');
            if (savedUsername) {
                document.getElementById('loginUsername').value = savedUsername;
                document.getElementById('remember').checked = true;
            }

            // 检查是否有保存的 Token，尝试自动登录
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            if (token && user) {
                // 尝试用 Token 获取用户信息
                fetch(API_BASE + '/api/auth/profile', {
                    headers: { 'Authorization': 'Bearer ' + token }
                })
                .then(res => res.json())
                .then(result => {
                    if (result.code === 200) {
                        showWelcomePanel(result.data);
                    } else {
                        // Token 失效，清除
                        localStorage.removeItem('token');
                        localStorage.removeItem('user');
                    }
                })
                .catch(() => {
                    // 网络错误，不处理，保持登录页面
                });
            }
        })();
    </script>
</body>
</html>
