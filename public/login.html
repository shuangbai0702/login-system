<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龟男属性鉴定 - 全国统一卷</title>
    <style>
        /* ========== 全局重置与基础 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            padding: 20px 0;
        }

        /* ========== 网格背景 ========== */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #FFF8F0;
            background-image:
                linear-gradient(rgba(255, 182, 193, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 182, 193, 0.3) 1px, transparent 1px);
            background-size: 24px 24px;
            z-index: 0;
        }

        .grid-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(255, 240, 220, 0.6) 100%);
            pointer-events: none;
        }

        /* ========== 装饰角标 ========== */
        .corner-decor {
            position: fixed;
            width: 60px;
            height: 60px;
            z-index: 1;
            opacity: 0.4;
        }
        .corner-decor::before,
        .corner-decor::after {
            content: '';
            position: absolute;
            background: #E8A0B4;
        }
        .corner-tl { top: 20px; left: 20px; }
        .corner-tl::before { top: 0; left: 0; width: 30px; height: 2px; }
        .corner-tl::after { top: 0; left: 0; width: 2px; height: 30px; }

        .corner-tr { top: 20px; right: 20px; }
        .corner-tr::before { top: 0; right: 0; width: 30px; height: 2px; }
        .corner-tr::after { top: 0; right: 0; width: 2px; height: 30px; }

        .corner-bl { bottom: 20px; left: 20px; }
        .corner-bl::before { bottom: 0; left: 0; width: 30px; height: 2px; }
        .corner-bl::after { bottom: 0; left: 0; width: 2px; height: 30px; }

        .corner-br { bottom: 20px; right: 20px; }
        .corner-br::before { bottom: 0; right: 0; width: 30px; height: 2px; }
        .corner-br::after { bottom: 0; right: 0; width: 2px; height: 30px; }

        /* ========== 浮动装饰圆点 ========== */
        .floating-dots {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .dot {
            position: absolute;
            border-radius: 50%;
            opacity: 0.5;
            animation: floatDot 6s ease-in-out infinite;
        }

        @keyframes floatDot {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        /* ========== 卡片容器 ========== */
        .quiz-card {
            position: relative;
            z-index: 10;
            width: 520px;
            max-width: 92vw;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 48px 40px 40px;
            box-shadow:
                0 8px 32px rgba(200, 150, 170, 0.2),
                0 2px 8px rgba(200, 150, 170, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
            border: 1.5px solid rgba(232, 160, 180, 0.3);
            animation: cardFadeIn 0.8s ease-out;
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .quiz-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, #E8A0B4, #F0C27F, #E8A0B4);
            border-radius: 0 0 4px 4px;
        }

        /* ========== 标题区域 ========== */
        .quiz-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .quiz-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #2D2D2D;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }

        .quiz-header .subtitle {
            font-size: 13px;
            color: #C4956A;
            letter-spacing: 2px;
            font-weight: 400;
        }

        /* ========== 主按钮 ========== */
        .quiz-btn {
            width: 100%;
            height: 50px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 6px;
            color: #FFF;
            background: linear-gradient(135deg, #E8A0B4, #D4849A);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(232, 160, 180, 0.35);
            font-family: inherit;
        }

        .quiz-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(232, 160, 180, 0.45);
        }

        .quiz-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(232, 160, 180, 0.3);
        }

        .quiz-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 40%;
            height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            transform: skewX(-20deg);
            animation: btnShine 4s ease-in-out infinite;
        }

        @keyframes btnShine {
            0%, 75%, 100% { left: -60%; }
            50% { left: 120%; }
        }

        .quiz-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 2px 8px rgba(232, 160, 180, 0.2);
        }

        .quiz-btn:disabled::after {
            display: none;
        }

        /* ========== 次要按钮（分享等） ========== */
        .quiz-btn-outline {
            width: 100%;
            height: 50px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 4px;
            color: #D4849A;
            background: transparent;
            border: 1.5px solid #E8A0B4;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .quiz-btn-outline:hover {
            background: rgba(232, 160, 180, 0.1);
            transform: translateY(-1px);
        }

        /* ========== 面板切换 ========== */
        .panel {
            display: none;
        }
        .panel.active {
            display: block;
            animation: panelFadeIn 0.4s ease-out;
        }

        @keyframes panelFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== 进度条 ========== */
        .progress-wrapper {
            margin-bottom: 28px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 13px;
            color: #8B7B8B;
        }

        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(232, 160, 180, 0.15);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #E8A0B4, #F0C27F);
            border-radius: 3px;
            transition: width 0.5s ease;
            width: 0%;
        }

        /* ========== 问题区域 ========== */
        .question-text {
            font-size: 16px;
            line-height: 1.7;
            color: #2D2D2D;
            margin-bottom: 24px;
            font-weight: 500;
            min-height: 54px;
        }

        /* ========== 选项卡片 ========== */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }

        .option-card {
            padding: 14px 18px;
            border: 1.5px solid rgba(232, 160, 180, 0.25);
            border-radius: 10px;
            background: rgba(255, 248, 240, 0.5);
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 14px;
            line-height: 1.6;
            color: #4A3F4F;
            position: relative;
            user-select: none;
        }

        .option-card:hover {
            border-color: rgba(232, 160, 180, 0.5);
            background: rgba(255, 248, 240, 0.8);
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(232, 160, 180, 0.15);
        }

        .option-card.selected {
            border-color: #E8A0B4;
            background: rgba(232, 160, 180, 0.12);
            box-shadow: 0 2px 12px rgba(232, 160, 180, 0.2);
        }

        .option-card.selected::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #E8A0B4, #D4849A);
            border-radius: 10px 0 0 10px;
        }

        .option-label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(232, 160, 180, 0.15);
            color: #D4849A;
            font-size: 12px;
            font-weight: 700;
            margin-right: 12px;
            flex-shrink: 0;
            transition: all 0.25s ease;
        }

        .option-card.selected .option-label {
            background: linear-gradient(135deg, #E8A0B4, #D4849A);
            color: #FFF;
        }

        .option-content {
            display: flex;
            align-items: flex-start;
        }

        .option-text {
            flex: 1;
        }

        /* ========== 结果页 ========== */
        .result-section {
            text-align: center;
        }

        .result-emoji {
            font-size: 64px;
            margin-bottom: 16px;
            animation: resultBounce 0.6s ease-out;
        }

        @keyframes resultBounce {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .result-score-label {
            font-size: 13px;
            color: #8B7B8B;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .result-score {
            font-size: 56px;
            font-weight: 800;
            background: linear-gradient(135deg, #E8A0B4, #D4849A);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .result-score-max {
            font-size: 14px;
            color: #B8A0A8;
            margin-bottom: 16px;
        }

        .result-level {
            font-size: 20px;
            font-weight: 700;
            color: #2D2D2D;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .result-desc {
            font-size: 14px;
            line-height: 1.8;
            color: #6B5B73;
            text-align: left;
            background: rgba(255, 248, 240, 0.6);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 28px;
            border: 1px solid rgba(232, 160, 180, 0.15);
        }

        .result-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ========== 首页装饰 ========== */
        .home-icon {
            font-size: 72px;
            margin-bottom: 16px;
            animation: homeFloat 3s ease-in-out infinite;
        }

        @keyframes homeFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .home-desc {
            font-size: 13px;
            color: #8B7B8B;
            line-height: 1.8;
            margin-bottom: 32px;
            text-align: center;
        }

        .home-desc strong {
            color: #D4849A;
        }

        /* ========== Toast 提示 ========== */
        .toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 14px 28px;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(232, 160, 180, 0.3);
            font-size: 14px;
            color: #6B5B73;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 90vw;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast-icon {
            font-size: 18px;
        }

        /* ========== 淡入淡出动画 ========== */
        .fade-enter {
            animation: fadeEnter 0.35s ease-out;
        }

        @keyframes fadeEnter {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* ========== 响应式 ========== */
        @media (max-width: 560px) {
            .quiz-card {
                padding: 36px 24px 32px;
                margin: 16px;
            }
            .quiz-header h1 { font-size: 24px; letter-spacing: 2px; }
            .quiz-btn { height: 46px; font-size: 15px; letter-spacing: 4px; }
            .quiz-btn-outline { height: 46px; font-size: 15px; }
            .question-text { font-size: 15px; }
            .option-card { padding: 12px 14px; font-size: 13px; }
            .result-score { font-size: 48px; }
            .result-emoji { font-size: 52px; }
            .home-icon { font-size: 56px; }
        }

        @media (max-width: 380px) {
            .quiz-card {
                padding: 28px 18px 24px;
            }
            .quiz-header h1 { font-size: 22px; }
            .option-card { padding: 10px 12px; font-size: 12px; }
            .option-label { width: 20px; height: 20px; font-size: 11px; margin-right: 8px; }
        }
    </style>
</head>
<body>

    <!-- 网格背景 -->
    <div class="grid-bg"></div>

    <!-- 装饰角标 -->
    <div class="corner-decor corner-tl"></div>
    <div class="corner-decor corner-tr"></div>
    <div class="corner-decor corner-bl"></div>
    <div class="corner-decor corner-br"></div>

    <!-- 浮动装饰圆点 -->
    <div class="floating-dots">
        <div class="dot" style="width:10px;height:10px;background:#7EB8DA;top:12%;left:8%;animation-delay:0s;"></div>
        <div class="dot" style="width:8px;height:8px;background:#B088D0;top:18%;right:12%;animation-delay:1s;"></div>
        <div class="dot" style="width:12px;height:12px;background:#E8A0B4;bottom:20%;left:15%;animation-delay:2s;"></div>
        <div class="dot" style="width:6px;height:6px;background:#6BCB77;bottom:30%;right:10%;animation-delay:0.5s;"></div>
        <div class="dot" style="width:9px;height:9px;background:#F0C27F;top:60%;left:5%;animation-delay:3s;"></div>
        <div class="dot" style="width:7px;height:7px;background:#E74C3C;top:35%;right:6%;animation-delay:1.5s;"></div>
        <div class="dot" style="width:11px;height:11px;background:#7EB8DA;bottom:10%;left:45%;animation-delay:2.5s;"></div>
        <div class="dot" style="width:8px;height:8px;background:#B088D0;top:8%;left:50%;animation-delay:4s;"></div>
    </div>

    <!-- 卡片 -->
    <div class="quiz-card">

        <!-- 标题 -->
        <div class="quiz-header">
            <h1 id="cardTitle">龟男属性鉴定</h1>
            <p class="subtitle" id="cardSubtitle">全国统一卷</p>
        </div>

        <!-- ====== 首页面板 ====== -->
        <div class="panel active" id="homePanel">
            <div style="text-align:center;">
                <div class="home-icon">🐢</div>
                <div class="home-desc">
                    本测试共 <strong>20</strong> 道题，每题 <strong>4</strong> 个选项<br>
                    请根据你的真实反应选择最接近的答案<br>
                    测试结果仅供娱乐，切勿当真
                </div>
                <button class="quiz-btn" onclick="startQuiz()">开 始 答 题</button>
            </div>
        </div>

        <!-- ====== 答题面板 ====== -->
        <div class="panel" id="quizPanel">
            <!-- 进度条 -->
            <div class="progress-wrapper">
                <div class="progress-info">
                    <span id="progressText">1 / 20</span>
                    <span id="progressPercent">5%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>
            </div>

            <!-- 问题 -->
            <div class="question-text" id="questionText"></div>

            <!-- 选项 -->
            <div class="options-list" id="optionsList"></div>

            <!-- 下一题按钮 -->
            <button class="quiz-btn" id="nextBtn" disabled onclick="nextQuestion()">下 一 题</button>
        </div>

        <!-- ====== 结果面板 ====== -->
        <div class="panel" id="resultPanel">
            <div class="result-section">
                <div class="result-emoji" id="resultEmoji"></div>
                <div class="result-score-label">你的得分</div>
                <div class="result-score" id="resultScore">0</div>
                <div class="result-score-max">满分 100</div>
                <div class="result-level" id="resultLevel"></div>
                <div class="result-desc" id="resultDesc"></div>
                <div class="result-buttons">
                    <button class="quiz-btn" onclick="restartQuiz()">重 新 测 试</button>
                    <button class="quiz-btn-outline" onclick="shareResult()">分 享 结 果</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast">
        <span class="toast-icon" id="toastIcon"></span>
        <span id="toastMsg"></span>
    </div>

    <script>
        // ============================================
        // 题目数据
        // ============================================
        const quizData = [
            {
                id: 1,
                question: "女生随口说了一句"最近那个包包挺好看的"，你的反应是：",
                options: [
                    { text: ""是啊挺好看的。"", score: 0 },
                    { text: "过节或她生日时，如果经济允许会考虑买。", score: 1 },
                    { text: "记在心里，第二周就花掉半个月工资买给她制造惊喜。", score: 3 },
                    { text: "即使要刷信用卡、吃一个月泡面，也要立刻买来送到她楼下。", score: 5 }
                ]
            },
            {
                id: 2,
                question: "给她发微信，她过了5个小时才回"刚刚在忙"，你会：",
                options: [
                    { text: "继续正常聊接下来的话题。", score: 0 },
                    { text: "半开玩笑地说"大忙人终于想起我了"。", score: 1 },
                    { text: "连忙回复"辛苦啦，别太累，有没有按时吃饭？"", score: 3 },
                    { text: "内心狂喜她居然还回复了，赶紧发个小红包安抚她"忙碌的伤痛"。", score: 5 }
                ]
            },
            {
                id: 3,
                question: "两人发生争吵，明明是她做错了事（比如放你鸽子），她的态度是：",
                options: [
                    { text: "据理力争，要求她必须认错。", score: 0 },
                    { text: "表达自己的不爽，但看她态度软化也就算了。", score: 1 },
                    { text: "主动先认错："虽然你放我鸽子，但我没照顾好你的情绪是我的错。"", score: 3 },
                    { text: "疯狂反思自己，觉得是因为自己不够优秀、平时给的压力太大，才导致她犯错。", score: 5 }
                ]
            },
            {
                id: 4,
                question: "她经常在你面前提起另一个条件很好的"男闺蜜"，你的反应是：",
                options: [
                    { text: "直接表达吃醋，并划定界限，不接受这种分享。", score: 0 },
                    { text: "表面上不动声色，暗地里跟她比拼实力。", score: 1 },
                    { text: "表现得非常大度："能认识这么优秀的朋友挺好"，生怕显得自己小心眼。", score: 3 },
                    { text: "主动帮她和男闺蜜制造机会，甚至帮男闺蜜递话，以显示自己的"格局"。", score: 5 }
                ]
            },
            {
                id: 5,
                question: "你们已经暧昧了很久，但她在朋友圈发了一张和其他男生的合照，配文"周末的快乐"，并屏蔽了你（但你从别处看到了）：",
                options: [
                    { text: "直接挑明，觉得这种人不值得继续。", score: 0 },
                    { text: "拍个截图发给她，问问什么情况。", score: 1 },
                    { text: "假装不知道，继续对她好，试图用自己的真心感动她。", score: 3 },
                    { text: "觉得是自己还没转正，没资格生气，甚至去点赞那条朋友圈。", score: 5 }
                ]
            },
            {
                id: 6,
                question: "她突然对你实施"冷暴力"，不回消息不接电话，你会：",
                options: [
                    { text: "给她发最后一条消息："想清楚了联系我"，然后去干自己的事。", score: 0 },
                    { text: "忍住几天不联系，实在憋不住再问候一句。", score: 1 },
                    { text: "每天早晚安打卡，写小作文反思自己哪里做错了。", score: 3 },
                    { text: "疯狂打电话，去她家/公司楼下堵她，甚至联系她的闺蜜求她们帮忙劝劝。", score: 5 }
                ]
            },
            {
                id: 7,

            { min: 81, max: 100, level: "龟神降临 / 纯爱战神（受难版）", emoji: "🥇", desc: "恭喜你达成最高境界！你已经完全丧失了独立人格，退化成了纯粹的附属品。别人当备胎还要点尊严，你当备胎还能帮正主修车。你的存在证明了人类多样性的下限。建议立刻断绝一切社交，重造三观，不然这辈子注定在当狗和被抛弃之间反复横跳。" }

        // ============================================
        // 状态管理
        // ============================================
        let currentQuestion = 0;
        let shuffledQuiz = [];
        let answers = []; // 存储每题选择的分数
        let totalScore = 0;
        let currentResult = null;

        const optionLabels = ['A', 'B', 'C', 'D'];

        // ============================================
        // Toast 提示
        // ============================================
        let toastTimer = null;
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            toastMsg.textContent = message;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ============================================
        // Fisher-Yates 洗牌算法
        // ============================================
        function shuffleArray(arr) {
            const shuffled = [...arr];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // ============================================
        // 面板切换
        // ============================================
        function switchPanel(panelId) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
        }

        // ============================================
        // 开始测试
        // ============================================
        function startQuiz() {
            currentQuestion = 0;
            answers = [];
            totalScore = 0;
            currentResult = null;

            // 深拷贝并打乱每题的选项顺序
            shuffledQuiz = quizData.map(q => ({
                ...q,
                options: shuffleArray(q.options)
            }));

            switchPanel('quizPanel');
            renderQuestion();
        }

        // ============================================
        // 渲染当前问题
        // ============================================
        function renderQuestion() {
            const q = shuffledQuiz[currentQuestion];
            const total = shuffledQuiz.length;
            const progress = ((currentQuestion) / total) * 100;

            // 更新进度条
            document.getElementById('progressText').textContent = (currentQuestion + 1) + ' / ' + total;
            document.getElementById('progressPercent').textContent = Math.round(progress) + '%';
            document.getElementById('progressBar').style.width = progress + '%';

            // 更新问题文本
            document.getElementById('questionText').textContent = q.question;

            // 渲染选项
            const optionsList = document.getElementById('optionsList');
            optionsList.innerHTML = '';

            q.options.forEach((opt, idx) => {
                const card = document.createElement('div');
                card.className = 'option-card';
                card.setAttribute('data-score', opt.score);
                card.innerHTML = `
                    <div class="option-content">
                        <span class="option-label">${optionLabels[idx]}</span>
                        <span class="option-text">${opt.text}</span>
                    </div>
                `;
                card.addEventListener('click', () => selectOption(card, opt.score));
                optionsList.appendChild(card);
            });

            // 更新按钮文字
            const nextBtn = document.getElementById('nextBtn');
            if (currentQuestion === total - 1) {
                nextBtn.textContent = '提 交 答 案';
            } else {
                nextBtn.textContent = '下 一 题';
            }
            nextBtn.disabled = true;

            // 添加淡入动画
            const quizPanel = document.getElementById('quizPanel');
            quizPanel.classList.remove('fade-enter');
            void quizPanel.offsetWidth; // 触发 reflow
            quizPanel.classList.add('fade-enter');
        }

        // ============================================
        // 选择选项
        // ============================================
        function selectOption(card, score) {
            // 取消其他选中
            document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
            // 选中当前
            card.classList.add('selected');
            // 启用按钮
            document.getElementById('nextBtn').disabled = false;
            // 存储当前选择
            answers[currentQuestion] = score;
        }

        // ============================================
        // 下一题 / 提交
        // ============================================
        function nextQuestion() {
            if (answers[currentQuestion] === undefined) {
                showToast('请先选择一个选项');
                return;
            }

            if (currentQuestion < shuffledQuiz.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                // 计算总分
                totalScore = answers.reduce((sum, s) => sum + s, 0);
                showResult();
            }
        }

        // ============================================
        // 显示结果
        // ============================================
        function showResult() {
            // 找到对应等级
            currentResult = results.find(r => totalScore >= r.min && totalScore <= r.max) || results[results.length - 1];

            // 更新进度条到100%
            document.getElementById('progressBar').style.width = '100%';

            switchPanel('resultPanel');

            // 填充结果数据
            document.getElementById('resultEmoji').textContent = currentResult.emoji;
            document.getElementById('resultLevel').textContent = currentResult.level;
            document.getElementById('resultDesc').textContent = currentResult.desc;

            // 分数动画
            animateScore(totalScore);
        }

        // ============================================
        // 分数计数动画
        // ============================================
        function animateScore(target) {
            const scoreEl = document.getElementById('resultScore');
            const duration = 1500;
            const startTime = performance.now();
            const startVal = 0;

            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);

                // easeOutCubic
                const eased = 1 - Math.pow(1 - progress, 3);
                const current = Math.round(startVal + (target - startVal) * eased);

                scoreEl.textContent = current;

                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }

            requestAnimationFrame(update);
        }

        // ============================================
        // 重新测试
        // ============================================
        function restartQuiz() {
            switchPanel('homePanel');
        }

        // ============================================
        // 分享结果
        // ============================================
        function shareResult() {
            if (!currentResult) return;

            const shareText = `我在龟男属性鉴定中获得了${totalScore}分，鉴定结果：${currentResult.emoji} ${currentResult.level}！你也来测测吧~`;

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(shareText).then(() => {
                    showToast('已复制到剪贴板，快去分享吧！');
                }).catch(() => {
                    fallbackCopy(shareText);
                });
            } else {
                fallbackCopy(shareText);
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast('已复制到剪贴板，快去分享吧！');
            } catch (e) {
                showToast('复制失败，请手动复制');
            }
            document.body.removeChild(textarea);
        }
    </script>
